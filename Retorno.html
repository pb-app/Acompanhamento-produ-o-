<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Controle de Retorno - Produção</title>

    <meta name="theme-color" content="#0077cc">
    <link rel="stylesheet" href="css/global.css">

    <style>
        .nav {
            display: flex; flex-wrap: wrap; gap: 0.45rem; justify-content: center;
            margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color);
        }
        .nav a {
            background-color: var(--primary); color: white; text-decoration: none;
            font-weight: 500; padding: 0.3rem 0.7rem; font-size: 0.85rem;
            border-radius: 8px; transition: background-color 0.2s, transform 0.2s;
            text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .nav a:hover { background-color: var(--primary-dark); transform: translateY(-2px); }
        .nav a[href="Massa.html"], .nav a[href="Retorno.html"] { background-color: var(--success); }
        .nav a[href="Massa.html"]:hover, .nav a[href="Retorno.html"]:hover { background-color: #218838; }
        
        .btn-engrenagem {
            background: none; border: none; font-size: 1.5rem; cursor: pointer;
            transition: transform 0.3s ease; padding: 0; box-shadow: none;
        }
        .btn-engrenagem:hover { transform: rotate(90deg); background: none;}
    </style>
</head>
<body>
    <header><h1>Acompanhamento de Produção</h1></header>

    <div class="container">
        <div class="nav">
            <a href="index.html">Voltar para Início</a>
            <a href="Massa.html">Fábrica de Massa</a>
            <a href="Retorno.html" style="font-weight: 700; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">Controle de Retorno</a>
        </div>

        <section id="lancamentoRetorno">
            <h2 style="display: flex; justify-content: space-between; align-items: center;">
                Lançamento de Retorno
                <button type="button" class="btn-engrenagem" onclick="abrirModalTaras()" title="Configurar Taras (Pesos)">⚙️</button>
            </h2>
            <form id="formRetorno">
                <div><label>Data</label><input type="date" id="data" required /></div>
                <div><label>Turno</label>
                    <select id="turno" required>
                        <option value="">Selecione</option>
                        <option>Comercial</option><option>Turno 1 (6x2)</option><option>Turno 2 (6x2)</option>
                        <option>Turno 3 (6x2)</option><option>Turno 4 (6x2)</option><option>Turno 1 (5x2)</option>
                        <option>Turno 2 (5x2)</option>
                    </select>
                </div>
                <div><label>Máquina</label>
                    <select id="maquina" required>
                        <option value="">Selecione</option>
                        <option>Roller</option><option>Maq de prato</option>
                        <option>Maq de xícara</option><option>Prensa</option>
                    </select>
                </div>
                <div><label>Tipo de Massa</label>
                    <select id="tipoMassa" required>
                        <option value="">Selecione</option>
                        <option>Stone</option><option>Faiança</option>
                    </select>
                </div>
                <div><label>Tipo</label>
                    <select id="tipo" required onchange="calcularPesoLiquido()">
                        <option value="">Selecione</option>
                        <option value="palete">Palete</option>
                        <option value="retrabalho">Retrabalho</option>
                        <option value="retalho">Retalho</option>
                        <option value="mesa">Mesa</option>
                    </select>
                </div>
                <div><label>Transporte</label>
                    <select id="transporte" required onchange="calcularPesoLiquido()">
                        <option value="">Selecione</option>
                        <option value="paleteira">Paleteira</option>
                        <option value="paleteira_eletrica">Paleteira Elétrica</option>
                    </select>
                </div>
                <div>
                    <label>Peso Bruto (KG)</label>
                    <input type="number" id="pesoBruto" step="0.01" min="0" required oninput="calcularPesoLiquido()" />
                </div>
                <div>
                    <label>Peso Líquido (KG)</label>
                    <input type="number" id="pesoLiquido" step="0.01" readonly style="background-color: #e2e8f0; font-weight: bold; color: var(--primary-dark);" placeholder="Calculado auto." />
                </div>
                
                <div class="full" style="text-align:right;">
                    <button type="button" class="secondary" onclick="document.getElementById('formRetorno').reset(); document.getElementById('data').valueAsDate = new Date();">Limpar</button>
                    <button type="submit">Lançar Retorno</button>
                </div>
            </form>
        </section>

        <section id="historicoRetorno" style="margin-top: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;">Registros de Retorno</h2>
                
                <div style="background: #f1f5f9; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border-color);">
                    <label for="filtroData" style="font-size: 0.85rem; font-weight: bold; margin-right: 5px; color: var(--primary-dark);">Filtrar por dia:</label>
                    <input type="date" id="filtroData" style="padding: 3px; border: 1px solid #ccc; border-radius: 4px;" />
                </div>
            </div>

            <table id="tabelaRetorno">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Turno</th>
                        <th>Máquina</th>
                        <th>Massa</th>
                        <th>Tipo</th>
                        <th>Transporte</th>
                        <th>Bruto (KG)</th>
                        <th>Líquido (KG)</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </div>

    <div id="modalTaras" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <h2>⚙️ Configurar Taras (Pesos)</h2>
            <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 15px;">Defina os pesos em KG para o cálculo automático do peso líquido.</p>
            <form id="formTaras" style="grid-template-columns: 1fr;">
                <div><label>Caçamba (KG)</label><input type="number" id="taraCacamba" step="0.01" required></div>
                <div><label>Palete (KG)</label><input type="number" id="taraPalete" step="0.01" required></div>
                <div><label>Paleteira Manual (KG)</label><input type="number" id="taraPaleteira" step="0.01" required></div>
                <div><label>Paleteira Elétrica (KG)</label><input type="number" id="taraPaleteiraEletrica" step="0.01" required></div>
                <div><label>Mesa (KG)</label><input type="number" id="taraMesa" step="0.01" required></div>
                
                <div class="full" style="text-align: right; margin-top: 15px;">
                    <button type="button" class="secondary" onclick="fecharModalTaras()">Cancelar</button>
                    <button type="button" onclick="salvarTaras()">Salvar Pesos</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('data').valueAsDate = new Date();

        let taras = JSON.parse(localStorage.getItem('pesosTaras')) || {
            cacamba: 0, palete: 0, paleteira: 0, paleteira_eletrica: 0, mesa: 0
        };

        function abrirModalTaras() {
            document.getElementById('taraCacamba').value = taras.cacamba;
            document.getElementById('taraPalete').value = taras.palete;
            document.getElementById('taraPaleteira').value = taras.paleteira;
            document.getElementById('taraPaleteiraEletrica').value = taras.paleteira_eletrica;
            document.getElementById('taraMesa').value = taras.mesa;
            document.getElementById('modalTaras').style.display = 'flex';
        }

        function fecharModalTaras() {
            document.getElementById('modalTaras').style.display = 'none';
        }

        function salvarTaras() {
            taras.cacamba = parseFloat(document.getElementById('taraCacamba').value) || 0;
            taras.palete = parseFloat(document.getElementById('taraPalete').value) || 0;
            taras.paleteira = parseFloat(document.getElementById('taraPaleteira').value) || 0;
            taras.paleteira_eletrica = parseFloat(document.getElementById('taraPaleteiraEletrica').value) || 0;
            taras.mesa = parseFloat(document.getElementById('taraMesa').value) || 0;
            
            localStorage.setItem('pesosTaras', JSON.stringify(taras));
            fecharModalTaras();
            calcularPesoLiquido(); 
            alert("Pesos atualizados com sucesso!");
        }

        function calcularPesoLiquido() {
            const tipo = document.getElementById('tipo').value;
            const transporte = document.getElementById('transporte').value;
            const pesoBruto = parseFloat(document.getElementById('pesoBruto').value) || 0;

            if (!tipo || !transporte || pesoBruto <= 0) {
                document.getElementById('pesoLiquido').value = '';
                return;
            }

            let pesoTransporte = 0;
            if (transporte === 'paleteira') pesoTransporte = taras.paleteira;
            else if (transporte === 'paleteira_eletrica') pesoTransporte = taras.paleteira_eletrica;

            let pesoRecipiente = 0;
            if (tipo === 'retrabalho' || tipo === 'retalho') pesoRecipiente = taras.cacamba;
            else if (tipo === 'mesa') pesoRecipiente = taras.mesa;
            else if (tipo === 'palete') pesoRecipiente = taras.palete;

            const taraTotal = pesoTransporte + pesoRecipiente;
            let pesoLiquido = pesoBruto - taraTotal;

            if (pesoLiquido < 0) pesoLiquido = 0;

            document.getElementById('pesoLiquido').value = pesoLiquido.toFixed(2);
        }

        document.getElementById('formRetorno').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const tbody = document.querySelector('#tabelaRetorno tbody');
            const dataRaw = document.getElementById('data').value;
            const dataFormatada = dataRaw.split('-').reverse().join('/');
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${dataFormatada}</td>
                <td>${document.getElementById('turno').value}</td>
                <td>${document.getElementById('maquina').value}</td>
                <td>${document.getElementById('tipoMassa').value}</td>
                <td>${document.getElementById('tipo').options[document.getElementById('tipo').selectedIndex].text}</td>
                <td>${document.getElementById('transporte').options[document.getElementById('transporte').selectedIndex].text}</td>
                <td><strong>${document.getElementById('pesoBruto').value}</strong></td>
                <td style="color: green; font-weight: bold;">${document.getElementById('pesoLiquido').value}</td>
            `;
            
            tbody.prepend(tr);
            
            this.reset();
            document.getElementById('data').valueAsDate = new Date();

            filtrarTabelaPorData();
        });

        const filtroDataInput = document.getElementById('filtroData');

        filtroDataInput.valueAsDate = new Date();

        function filtrarTabelaPorData() {
            const dataFiltroRaw = filtroDataInput.value;
            const linhas = document.querySelectorAll('#tabelaRetorno tbody tr');

            if (!dataFiltroRaw) {
                linhas.forEach(linha => linha.style.display = '');
                return;
            }

            const dataFiltroFormatada = dataFiltroRaw.split('-').reverse().join('/');

            linhas.forEach(linha => {
                const colunaData = linha.querySelector('td:first-child');
                
                if (colunaData) {
                    if (colunaData.textContent === dataFiltroFormatada) {
                        linha.style.display = '';
                    } else {
                        linha.style.display = 'none';
                    }
                }
            });
        }

        filtroDataInput.addEventListener('change', filtrarTabelaPorData);

        filtrarTabelaPorData();
    </script>
</body>
</html>
